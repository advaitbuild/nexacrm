<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nexa CRM - Lead Entry</title>
<style>
  :root{
    --accent:#1a56db; --dark:#111827; --gray:#f6f7f9; --border:#e2e5ea; --text:#1f2937; --muted:#6b7280;
  }
  *{box-sizing:border-box;}
  html, body{
    margin:0;
  }
  body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:var(--gray);
    margin:0;
    padding:0;
    color:var(--text);
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-y:auto;
    min-height:100vh;
  }
  .header{
    background:transparent;
    color:var(--dark);
    padding:22px 24px 12px;
    display:flex;
    flex-direction:row;
    align-items:baseline;
    justify-content:center;
    gap:10px;
    text-align:center;
    flex:none;
    max-width:480px;
    width:100%;
    margin:0 auto;
  }
  .header h1{
    margin:0;
    font-size:19px;
    font-weight:700;
    letter-spacing:.5px;
    color:var(--dark);
    white-space:nowrap;
  }
  .header .dot{
    color:var(--accent);
  }
  .header .tagline{
    font-size:10.5px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:1.5px;
    white-space:nowrap;
  }
  .container{
    max-width:480px;
    width:100%;
    margin:12px auto 24px;
    background:#fff;
    border-radius:10px;
    border:1px solid var(--border);
    box-shadow:0 2px 10px rgba(17,24,39,0.06);
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  .form-title{
    padding:12px 22px;
    border-bottom:1px solid var(--border);
    background:#fafbfc;
    flex:none;
  }
  .form-title h2{margin:0;font-size:14px;color:var(--dark);}
  .form-title p{margin:2px 0 0;font-size:11px;color:var(--muted);}
  .form-body{
    padding:16px 22px;
    display:flex;
    flex-direction:column;
    gap:11px;
  }
  label{
    display:block;
    font-size:11px;
    font-weight:600;
    margin-bottom:4px;
    color:#374151;
  }
  input, select, textarea{
    width:100%;
    padding:8px 10px;
    border:1px solid var(--border);
    border-radius:6px;
    font-size:13px;
    font-family:inherit;
    color:var(--text);
    background:#fff;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  input:hover, select:hover, textarea:hover{
    border-color:#c2c8d1;
  }
  input:focus, select:focus, textarea:focus{
    outline:none;
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(26,86,219,0.12);
  }
  textarea{resize:none;min-height:44px;overflow:hidden;}
  .chip-row{
    display:flex;
    gap:5px;
    margin-top:5px;
  }
  .chip{
    flex:none;
    padding:3px 9px;
    font-size:11px;
    font-weight:600;
    border-radius:20px;
    border:1px solid var(--border);
    background:#fff;
    color:var(--accent);
    cursor:pointer;
    transition:background .15s ease, border-color .15s ease;
  }
  .chip:hover{
    background:#eef2fb;
    border-color:var(--accent);
  }
  input:disabled{
    background:#f5f6f8;
    color:var(--text);
    cursor:not-allowed;
    opacity:1;
  }
  .actions{
    display:flex;
    gap:10px;
    margin-top:4px;
  }
  button{
    flex:1;
    padding:10px 14px;
    border-radius:6px;
    border:none;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    transition:filter .15s ease;
  }
  #copyBtn{background:#34d399;color:#064e3b;}
  #copyBtn:hover{background:#22c58e;}
  #resetBtn{background:#f87171;color:#7f1d1d;}
  #resetBtn:hover{background:#ef5a5a;}
  .status{
    text-align:center;
    font-size:11px;
    color:#059669;
    min-height:14px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>NEXA <span class="dot">&middot;</span> CRM</h1>
  <span class="tagline">| Lead Capture</span>
</div>

<div class="container">
  <div class="form-title">
    <h2>New customer enquiry</h2>
    <p>Fill in the details below and copy the formatted record.</p>
  </div>

  <div class="form-body">
    <div class="field">
      <label for="custName">Customer name</label>
      <input type="text" id="custName" placeholder="Enter customer full name">
    </div>

    <div class="field">
      <label for="vehicleModel">Vehicle model</label>
      <select id="vehicleModel">
        <option value="">Select model</option>
        <option value="Maruti Suzuki Nexa Fronx">Maruti Suzuki Nexa Fronx</option>
        <option value="Maruti Suzuki Nexa Baleno">Maruti Suzuki Nexa Baleno</option>
        <option value="Maruti Suzuki Nexa Grand Vitara">Maruti Suzuki Nexa Grand Vitara</option>
        <option value="Maruti Suzuki Nexa E-Vitara">Maruti Suzuki Nexa E-Vitara</option>
        <option value="Maruti Suzuki Nexa XL6">Maruti Suzuki Nexa XL6</option>
        <option value="Maruti Suzuki Nexa Invicto">Maruti Suzuki Nexa Invicto</option>
        <option value="Maruti Suzuki Nexa Jimny">Maruti Suzuki Nexa Jimny</option>
        <option value="Maruti Suzuki Nexa Ignis">Maruti Suzuki Nexa Ignis</option>
      </select>
    </div>

    <div class="field">
      <label for="variant">Variant name</label>
      <input type="text" id="variant" placeholder="e.g. Zeta, Alpha, Delta AMT">
    </div>

    <div class="field">
      <label for="timeline">Buying timeline</label>
      <select id="timeline">
        <option value="">Select timeline</option>
        <option>1 week</option>
        <option>2 week</option>
        <option>1 month</option>
        <option>1 to 1.5 month</option>
        <option>1 to 2 month</option>
      </select>
    </div>

    <div class="field">
      <label for="dealership">Dealership name and location</label>
      <input type="text" id="dealership" value="Singla Link Agency, Lajpat Nagar" disabled>
    </div>

    <div class="field">
      <label for="email">Email ID</label>
      <input type="email" id="email" placeholder="customer@email.com">
      <div class="chip-row">
        <button type="button" class="chip" data-domain="@gmail.com">@gmail.com</button>
        <button type="button" class="chip" data-domain="@outlook.com">@outlook.com</button>
        <button type="button" class="chip" data-domain="@yahoo.com">@yahoo.com</button>
      </div>
    </div>

    <div class="field">
      <label for="location">Customer location</label>
      <input type="text" id="location" placeholder="e.g. Lajpat Nagar, New Delhi">
    </div>

    <div class="field">
      <label for="enquiry">Key enquiry</label>
      <textarea id="enquiry" placeholder="Notes on customer requirement, questions asked, etc."></textarea>
    </div>

    <div class="status" id="status"></div>

    <div class="actions">
      <button id="copyBtn">Copy details</button>
      <button id="resetBtn">Reset form</button>
    </div>
  </div>
</div>

<script>
function buildText(){
  const val = id => document.getElementById(id).value.trim();
  return (
"Customer Name - " + val('custName') + "\n" +
"Vehicle Model and Variant Name - " + val('vehicleModel') + (val('variant') ? (" " + val('variant')) : "") + "\n" +
"Buying Timeline - " + val('timeline') + "\n" +
"Dealership Name and Location - Singla Link Agency, Lajpat Nagar\n" +
"Email Id - " + val('email') + "\n" +
"Customer Location - " + val('location') + "\n" +
"Key Enquiry - " + val('enquiry')
  );
}

function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  let ok = false;
  try { ok = document.execCommand('copy'); } catch(e) { ok = false; }
  document.body.removeChild(ta);
  return ok;
}

const enquiryBox = document.getElementById('enquiry');
function autoGrow(){
  enquiryBox.style.height = 'auto';
  enquiryBox.style.height = enquiryBox.scrollHeight + 'px';
}
enquiryBox.addEventListener('input', autoGrow);

document.querySelectorAll('.chip').forEach(function(chip){
  chip.addEventListener('click', function(){
    const emailInput = document.getElementById('email');
    const domain = chip.getAttribute('data-domain');
    let current = emailInput.value.trim();
    const atIndex = current.indexOf('@');
    if (atIndex !== -1) {
      current = current.substring(0, atIndex);
    }
    emailInput.value = current + domain;
    emailInput.focus();
  });
});

document.getElementById('copyBtn').addEventListener('click', function(){
  const text = buildText();
  const status = document.getElementById('status');

  function showCopied(){
    status.textContent = "Details copied to clipboard.";
    setTimeout(()=>{ status.textContent=""; }, 2500);
  }
  function showFailed(){
    status.textContent = "Could not copy automatically - please copy manually.";
  }

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(showCopied).catch(function(){
      if (fallbackCopy(text)) { showCopied(); } else { showFailed(); }
    });
  } else {
    if (fallbackCopy(text)) { showCopied(); } else { showFailed(); }
  }
});

document.getElementById('resetBtn').addEventListener('click', function(){
  document.getElementById('custName').value='';
  document.getElementById('vehicleModel').value='';
  document.getElementById('variant').value='';
  document.getElementById('timeline').value='';
  document.getElementById('email').value='';
  document.getElementById('location').value='';
  document.getElementById('enquiry').value='';
  document.getElementById('enquiry').style.height = 'auto';
  document.getElementById('status').textContent = "Form cleared.";
  setTimeout(()=>{ document.getElementById('status').textContent=""; }, 1500);
});
</script>

</body>
</html>
